<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slime Cube Canvas</title>
    <meta
      name="description"
      content="An interactive slime-like 3D cube built with canvas. Click it to make it squish and bounce."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="actions">
          <a class="button primary" href="https://github.com/Yanxiyimengya/Yanxiyimengya">Back to GitHub Profile</a>
          <button class="button secondary" id="bounceButton" type="button">Bounce</button>
        </div>
      </section>

      <section class="stage-card">
        <div class="hud">
          <span>SLIME CUBE / CANVAS</span>
          <span>CLICK TO BOUNCE</span>
        </div>
        <canvas id="slimeCanvas" aria-label="Interactive slime cube canvas"></canvas>
      </section>
    </main>

    <script src="./slime-cube.js"></script>
  </body>
</html>
