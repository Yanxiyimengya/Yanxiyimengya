<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Slime Cube Preview</title>
  <desc id="desc">A preview card for an interactive slime-like 3D cube canvas demo.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0c4a6e" />
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="20%" r="36%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <style>
      .eyebrow {
        font: 700 15px "Segoe UI", Arial, sans-serif;
        letter-spacing: 4px;
      }
      .title {
        font: 800 54px "Segoe UI", Arial, sans-serif;
        letter-spacing: -1px;
      }
      .body {
        font: 400 22px "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      .mono {
        font: 700 16px "JetBrains Mono", Consolas, monospace;
        letter-spacing: 2px;
      }
      .hint {
        animation: blink 1.8s ease-in-out infinite;
      }
      .cube-group {
        animation: bounce 2.6s ease-in-out infinite;
        transform-origin: 850px 360px;
      }
      @keyframes blink {
        0%, 100% { opacity: 0.62; }
        50% { opacity: 1; }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0px) scale(1, 1); }
        18% { transform: translateY(8px) scale(1.07, 0.92); }
        36% { transform: translateY(-18px) scale(0.95, 1.08); }
        52% { transform: translateY(4px) scale(1.03, 0.97); }
        70% { transform: translateY(-6px) scale(0.99, 1.02); }
      }
    </style>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)" />
  <rect width="1200" height="620" fill="url(#glowA)" />
  <rect width="1200" height="620" fill="url(#glowB)" />

  <rect x="32" y="32" width="1136" height="556" rx="28" fill="none" stroke="url(#frame)" stroke-width="2" />
  <rect x="56" y="56" width="1088" height="508" rx="24" fill="rgba(15,23,42,0.22)" stroke="rgba(103,232,249,0.16)" />

  <text x="88" y="116" class="eyebrow" fill="#67e8f9">INTERACTIVE CANVAS</text>
  <text x="88" y="182" class="title" fill="#f8fafc">Slime Cube</text>
  <text x="88" y="232" class="body" fill="#cbd5e1">大号半透明立方体 + 内部实心小立方体</text>
  <text x="88" y="270" class="body" fill="#cbd5e1">鼠标靠近会轻微转向，点击会像史莱姆一样弹动</text>

  <g>
    <rect x="88" y="336" width="280" height="60" rx="30" fill="rgba(56,189,248,0.16)" stroke="rgba(103,232,249,0.34)" />
    <text x="228" y="374" text-anchor="middle" class="mono" fill="#e0f2fe">CLICK TO OPEN DEMO</text>
  </g>

  <g class="hint">
    <text x="88" y="470" class="mono" fill="#fde68a">README 里展示预览，点击进入可交互版本</text>
  </g>

  <ellipse cx="862" cy="494" rx="168" ry="40" fill="#67e8f9" opacity="0.14" filter="url(#blur)" />

  <g class="cube-group">
    <polygon points="850,162 962,230 850,300 738,230" fill="rgba(125,211,252,0.18)" stroke="rgba(224,242,254,0.42)" />
    <polygon points="738,230 850,300 850,442 738,372" fill="rgba(34,211,238,0.18)" stroke="rgba(224,242,254,0.42)" />
    <polygon points="962,230 850,300 850,442 962,372" fill="rgba(14,165,233,0.22)" stroke="rgba(224,242,254,0.42)" />
    <polygon points="850,162 850,300 850,442 850,300" fill="none" stroke="rgba(224,242,254,0.22)" />
    <line x1="850" y1="162" x2="850" y2="442" stroke="rgba(224,242,254,0.24)" />
    <line x1="738" y1="230" x2="962" y2="230" stroke="rgba(224,242,254,0.24)" />

    <polygon points="850,246 902,278 850,310 798,278" fill="#38bdf8" stroke="rgba(255,255,255,0.28)" />
    <polygon points="798,278 850,310 850,382 798,350" fill="#0f766e" stroke="rgba(255,255,255,0.22)" />
    <polygon points="902,278 850,310 850,382 902,350" fill="#0ea5e9" stroke="rgba(255,255,255,0.22)" />
  </g>
</svg>
