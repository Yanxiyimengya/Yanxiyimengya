<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">3D slime cube preview</title>
  <desc id="desc">A canvas-style pseudo-3D rotating cube preview with a translucent outer cube and a solid inner cube.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="52%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0b4d71" />
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="16%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="22%" r="34%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="outerTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="outerFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="outerSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="innerTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="innerFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="innerSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#075985" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <style>
      .eyebrow {
        font: 700 15px "Segoe UI", Arial, sans-serif;
        letter-spacing: 4px;
      }
      .title {
        font: 800 56px "Segoe UI", Arial, sans-serif;
        letter-spacing: -1px;
      }
      .body {
        font: 400 22px "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      .mono {
        font: 700 16px "JetBrains Mono", Consolas, monospace;
        letter-spacing: 2px;
      }
      .float {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)" />
  <rect width="1200" height="620" fill="url(#glowA)" />
  <rect width="1200" height="620" fill="url(#glowB)" />

  <rect x="32" y="32" width="1136" height="556" rx="28" fill="none" stroke="url(#frame)" stroke-width="2" />
  <rect x="56" y="56" width="1088" height="508" rx="24" fill="rgba(15,23,42,0.18)" stroke="rgba(103,232,249,0.14)" />

  <g opacity="0.12">
    <path d="M56 408 H1144" stroke="#67e8f9" stroke-width="1" stroke-dasharray="8 12" />
    <path d="M56 456 H1144" stroke="#67e8f9" stroke-width="1" stroke-dasharray="8 12" />
  </g>

  <text x="88" y="116" class="eyebrow" fill="#67e8f9">3D CANVAS STYLE PREVIEW</text>
  <text x="88" y="184" class="title" fill="#f8fafc">Slime Cube</text>
  <text x="88" y="236" class="body" fill="#cbd5e1">大的半透明外立方体，里面包着一个实心的小立方体</text>
  <text x="88" y="274" class="body" fill="#cbd5e1">动画不是平面转圈，而是模拟 canvas 透视投影的 3D 缓慢旋转</text>

  <rect x="88" y="336" width="328" height="60" rx="30" fill="rgba(56,189,248,0.12)" stroke="rgba(103,232,249,0.26)" />
  <text x="252" y="374" text-anchor="middle" class="mono" fill="#e0f2fe">TRANSLUCENT OUTER CUBE</text>

  <rect x="88" y="424" width="284" height="60" rx="30" fill="rgba(14,165,233,0.12)" stroke="rgba(103,232,249,0.22)" />
  <text x="230" y="462" text-anchor="middle" class="mono" fill="#e0f2fe">SOLID INNER CUBE</text>

  <text x="88" y="536" class="mono" fill="#fde68a">slow perspective rotation / canvas-style shading / README-ready</text>

  <ellipse cx="848" cy="516" rx="170" ry="40" fill="#67e8f9" opacity="0.12" filter="url(#blur)" />
  <ellipse cx="848" cy="516" rx="146" ry="26" fill="#67e8f9" opacity="0.12">
    <animate attributeName="rx" values="142;156;142;148;142" dur="16s" repeatCount="indefinite" />
  </ellipse>

  <g class="float">
    <g>
      <polygon fill="url(#outerTop)" stroke="rgba(224,242,254,0.34)" stroke-width="2"
        points="742,182 874,172 912,212 782,220">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          742,182 874,172 912,212 782,220;
          694,198 780,186 900,214 814,226;
          724,188 836,178 906,212 796,222;
          694,198 780,186 900,214 814,226;
          742,182 874,172 912,212 782,220" />
      </polygon>

      <polygon fill="url(#outerFront)" stroke="rgba(224,242,254,0.28)" stroke-width="2"
        points="782,220 912,212 912,374 782,382">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          782,220 912,212 912,374 782,382;
          814,226 900,214 900,380 814,392;
          796,222 906,212 906,376 796,386;
          814,226 900,214 900,380 814,392;
          782,220 912,212 912,374 782,382" />
      </polygon>

      <polygon fill="url(#outerSide)" stroke="rgba(224,242,254,0.3)" stroke-width="2"
        points="874,172 912,212 912,374 874,334">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          874,172 912,212 912,374 874,334;
          780,186 900,214 900,380 780,352;
          836,178 906,212 906,376 836,342;
          780,186 900,214 900,380 780,352;
          874,172 912,212 912,374 874,334" />
      </polygon>

      <polyline fill="none" stroke="rgba(224,242,254,0.18)" stroke-width="2"
        points="742,182 874,172 912,212 912,374 874,334 742,344 742,182 782,220 782,382 742,344">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          742,182 874,172 912,212 912,374 874,334 742,344 742,182 782,220 782,382 742,344;
          694,198 780,186 900,214 900,380 780,352 694,364 694,198 814,226 814,392 694,364;
          724,188 836,178 906,212 906,376 836,342 724,352 724,188 796,222 796,386 724,352;
          694,198 780,186 900,214 900,380 780,352 694,364 694,198 814,226 814,392 694,364;
          742,182 874,172 912,212 912,374 874,334 742,344 742,182 782,220 782,382 742,344" />
      </polyline>

      <line x1="742" y1="182" x2="742" y2="344" stroke="rgba(224,242,254,0.14)" stroke-width="2">
        <animate attributeName="x1" dur="16s" repeatCount="indefinite" values="742;694;724;694;742" />
        <animate attributeName="y1" dur="16s" repeatCount="indefinite" values="182;198;188;198;182" />
        <animate attributeName="x2" dur="16s" repeatCount="indefinite" values="742;694;724;694;742" />
        <animate attributeName="y2" dur="16s" repeatCount="indefinite" values="344;364;352;364;344" />
      </line>
    </g>

    <g>
      <polygon fill="url(#innerTop)" stroke="rgba(255,255,255,0.24)" stroke-width="1.6"
        points="810,258 860,253 878,270 828,275">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          810,258 860,253 878,270 828,275;
          796,264 830,258 876,272 842,278;
          805,261 848,256 878,271 835,276;
          796,264 830,258 876,272 842,278;
          810,258 860,253 878,270 828,275" />
      </polygon>

      <polygon fill="url(#innerFront)" stroke="rgba(255,255,255,0.22)" stroke-width="1.6"
        points="828,275 878,270 878,332 828,337">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          828,275 878,270 878,332 828,337;
          842,278 876,272 876,338 842,344;
          835,276 878,271 878,335 835,340;
          842,278 876,272 876,338 842,344;
          828,275 878,270 878,332 828,337" />
      </polygon>

      <polygon fill="url(#innerSide)" stroke="rgba(255,255,255,0.24)" stroke-width="1.6"
        points="860,253 878,270 878,332 860,315">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          860,253 878,270 878,332 860,315;
          830,258 876,272 876,338 830,324;
          848,256 878,271 878,335 848,320;
          830,258 876,272 876,338 830,324;
          860,253 878,270 878,332 860,315" />
      </polygon>

      <polyline fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.4"
        points="810,258 860,253 878,270 878,332 860,315 810,320 810,258 828,275 828,337 810,320">
        <animate attributeName="points" dur="16s" repeatCount="indefinite"
          values="
          810,258 860,253 878,270 878,332 860,315 810,320 810,258 828,275 828,337 810,320;
          796,264 830,258 876,272 876,338 830,324 796,330 796,264 842,278 842,344 796,330;
          805,261 848,256 878,271 878,335 848,320 805,325 805,261 835,276 835,340 805,325;
          796,264 830,258 876,272 876,338 830,324 796,330 796,264 842,278 842,344 796,330;
          810,258 860,253 878,270 878,332 860,315 810,320 810,258 828,275 828,337 810,320" />
      </polyline>
    </g>
  </g>
</svg>
