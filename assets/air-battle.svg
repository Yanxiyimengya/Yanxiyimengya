      <animateTransform attributeName="transform" type="translate" values="586 348;586 36" dur="0.85s" begin="0.54s" repeatCount="indefinite" />
      <use href="#bulletSprite" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.82;1" dur="0.85s" begin="0.72s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="600 338;600 28" dur="0.85s" begin="0.72s" repeatCount="indefinite" />
      <use href="#bulletSprite" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.82;1" dur="0.85s" begin="0.9s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="614 348;614 36" dur="0.85s" begin="0.9s" repeatCount="indefinite" />
      <use href="#bulletSprite" />
