        <animate attributeName="r" values="0;0;0;0;20;0" keyTimes="0;0.34;0.37;0.41;0.48;1" dur="6.7s" begin="0.7s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;0;0;0.9;0" keyTimes="0;0.34;0.37;0.41;0.48;1" dur="6.7s" begin="0.7s" repeatCount="indefinite" />
