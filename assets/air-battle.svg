<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Air battle animation</title>
  <desc id="desc">A looping arcade shooter scene with a fighter plane firing bullets while enemy ships spawn from the top.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#082f49" />
    </linearGradient>
    <radialGradient id="nebulaA" cx="22%" cy="18%" r="46%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaB" cx="78%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="frameStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="fighterBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="55%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="fighterWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="canopy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="bullet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="enemyBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <linearGradient id="enemyWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="45%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <g id="bulletSprite" filter="url(#glow)">
      <rect x="-4" y="-24" width="8" height="28" rx="4" fill="url(#bullet)" />
      <circle cx="0" cy="-24" r="5" fill="#fef08a" opacity="0.9" />
    </g>
    <g id="enemyShip">
      <ellipse cx="0" cy="0" rx="30" ry="12" fill="#450a0a" opacity="0.35" />
      <path d="M0 -22 L20 -6 L28 6 L10 18 L0 10 L-10 18 L-28 6 L-20 -6 Z" fill="url(#enemyBody)" stroke="#fecdd3" stroke-opacity="0.5" />
      <path d="M-32 -1 L-52 14 L-18 10 Z" fill="url(#enemyWing)" />
      <path d="M32 -1 L52 14 L18 10 Z" fill="url(#enemyWing)" />
      <circle class="enemy-core" cx="0" cy="-2" r="6" fill="#fee2e2" filter="url(#glow)" />
      <path d="M-12 20 L0 8 L12 20" fill="none" stroke="#fdba74" stroke-width="3" stroke-linecap="round" />
    </g>
    <style>
      .title {
        font: 800 34px "Segoe UI", Arial, sans-serif;
        letter-spacing: 4px;
      }
      .label {
        font: 700 16px "Segoe UI", Arial, sans-serif;
        letter-spacing: 3px;
      }
      .hud {
        font: 700 18px "JetBrains Mono", Consolas, monospace;
        letter-spacing: 1px;
      }
      .star {
        animation: twinkle 3.8s ease-in-out infinite;
      }
      .star.slow {
        animation-duration: 5.6s;
      }
      .star.fast {
        animation-duration: 2.4s;
      }
      .enemy-core {
        animation: blink 0.7s ease-in-out infinite alternate;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
      @keyframes blink {
        0% { opacity: 0.35; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)" />
  <rect width="1200" height="520" fill="url(#nebulaA)" />
  <rect width="1200" height="520" fill="url(#nebulaB)" />

  <g opacity="0.9">
    <circle class="star" cx="94" cy="72" r="2.2" fill="#ffffff" />
    <circle class="star slow" cx="166" cy="118" r="1.6" fill="#e0f2fe" />
    <circle class="star fast" cx="244" cy="66" r="2.1" fill="#ffffff" />
    <circle class="star" cx="324" cy="104" r="1.5" fill="#93c5fd" />
    <circle class="star slow" cx="402" cy="84" r="2.3" fill="#ffffff" />
    <circle class="star fast" cx="492" cy="126" r="1.7" fill="#bfdbfe" />
    <circle class="star" cx="578" cy="70" r="2.2" fill="#ffffff" />
    <circle class="star slow" cx="664" cy="110" r="1.7" fill="#e0f2fe" />
    <circle class="star fast" cx="746" cy="76" r="2.4" fill="#ffffff" />
    <circle class="star" cx="832" cy="118" r="1.6" fill="#bfdbfe" />
    <circle class="star slow" cx="918" cy="70" r="2.1" fill="#ffffff" />
    <circle class="star fast" cx="1002" cy="108" r="1.9" fill="#e0f2fe" />
    <circle class="star" cx="1090" cy="82" r="2.2" fill="#ffffff" />
    <circle class="star slow" cx="1148" cy="134" r="1.5" fill="#bfdbfe" />
    <circle class="star fast" cx="138" cy="212" r="1.8" fill="#ffffff" />
    <circle class="star" cx="286" cy="186" r="1.4" fill="#e0f2fe" />
    <circle class="star slow" cx="456" cy="232" r="2.1" fill="#ffffff" />
    <circle class="star fast" cx="688" cy="198" r="1.6" fill="#bfdbfe" />
    <circle class="star" cx="882" cy="226" r="2.3" fill="#ffffff" />
    <circle class="star slow" cx="1048" cy="196" r="1.7" fill="#e0f2fe" />
  </g>

  <g opacity="0.08">
    <rect x="0" y="0" width="1200" height="520" fill="url(#scan)" />
    <rect x="0" y="0" width="1200" height="520" fill="url(#scan)">
      <animateTransform attributeName="transform" type="translate" values="-1200 0;1200 0" dur="9s" repeatCount="indefinite" />
    </rect>
  </g>

  <g>
    <rect x="48" y="42" width="1104" height="436" rx="30" fill="#0f172a" fill-opacity="0.18" stroke="url(#frameStroke)" stroke-width="2" />
    <rect x="68" y="62" width="1064" height="396" rx="26" fill="none" stroke="#67e8f9" stroke-opacity="0.15" />
  </g>

  <text x="82" y="92" class="label" fill="#67e8f9">PROFILE MINI GAME</text>
  <text x="82" y="132" class="title" fill="#f8fafc">AIR BATTLE MODE</text>
  <text x="82" y="158" class="label" fill="#cbd5e1">auto fire enabled / enemy wave incoming / arcade loop</text>

  <text x="916" y="92" class="hud" fill="#93c5fd">SCORE 2026</text>
  <text x="916" y="120" class="hud" fill="#67e8f9">COMBO x 09</text>
  <text x="916" y="148" class="hud" fill="#fef08a">HP 100%</text>

  <g opacity="0.35">
    <line x1="82" y1="178" x2="1118" y2="178" stroke="#67e8f9" stroke-opacity="0.6" stroke-dasharray="6 12" />
    <line x1="82" y1="414" x2="1118" y2="414" stroke="#67e8f9" stroke-opacity="0.3" stroke-dasharray="8 14" />
  </g>

  <g filter="url(#softGlow)">
    <rect x="88" y="174" width="120" height="4" rx="2" fill="#67e8f9">
      <animate attributeName="width" values="120;980;120" dur="7.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <g opacity="0.82">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.82;1" dur="0.85s" begin="0s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="586 348;586 36" dur="0.85s" begin="0s" repeatCount="indefinite" />
      <use href="#bulletSprite" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.82;1" dur="0.85s" begin="0.18s" repeatCount="indefinite" />
