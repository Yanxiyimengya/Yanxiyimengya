      <path d="M-30 20 C-28 34 -24 44 -18 58 C-12 44 -10 34 -8 20 Z" fill="url(#flame)" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="1 1;1 1.15;1 1" dur="0.4s" begin="0.1s" repeatCount="indefinite" />
      </path>
      <path d="M30 20 C28 34 24 44 18 58 C12 44 10 34 8 20 Z" fill="url(#flame)" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="1 1;1 1.15;1 1" dur="0.4s" begin="0.2s" repeatCount="indefinite" />
      </path>
    </g>

    <g>
      <path d="M0 -66 L22 -14 L18 8 L0 -4 L-18 8 L-22 -14 Z" fill="url(#fighterBody)" stroke="#e2e8f0" stroke-opacity="0.6" />
      <path d="M-20 -6 L-88 28 L-24 18 L-10 2 Z" fill="url(#fighterWing)" stroke="#bae6fd" stroke-opacity="0.35" />
      <path d="M20 -6 L88 28 L24 18 L10 2 Z" fill="url(#fighterWing)" stroke="#bae6fd" stroke-opacity="0.35" />
      <path d="M-10 20 L-42 52 L-8 44 Z" fill="#475569" />
      <path d="M10 20 L42 52 L8 44 Z" fill="#475569" />
      <rect x="-8" y="-74" width="16" height="26" rx="8" fill="url(#canopy)" filter="url(#glow)">
