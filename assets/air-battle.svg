      <circle fill="#fde68a">
        <animate attributeName="r" values="0;0;0;0;18;0" keyTimes="0;0.28;0.31;0.35;0.42;1" dur="6.3s" begin="0.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;0;0;0.9;0" keyTimes="0;0.28;0.31;0.35;0.42;1" dur="6.3s" begin="0.2s" repeatCount="indefinite" />
