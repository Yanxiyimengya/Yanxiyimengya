        <animate attributeName="r" values="0;0;0;0;16;0" keyTimes="0;0.29;0.33;0.37;0.44;1" dur="5.4s" begin="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;0;0;0.85;0" keyTimes="0;0.29;0.33;0.37;0.44;1" dur="5.4s" begin="1.8s" repeatCount="indefinite" />
      </circle>
    </g>
    <g transform="translate(926 230)">
