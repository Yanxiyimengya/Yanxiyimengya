      <animateTransform attributeName="transform" type="translate" values="696 -88;728 42;690 168;738 274" dur="5.4s" begin="1.8s" repeatCount="indefinite" />
      <use href="#enemyShip" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.06;0.12;0.84;1" dur="6.9s" begin="2.4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="892 -82;864 64;926 178;886 302" dur="6.9s" begin="2.4s" repeatCount="indefinite" />
      <use href="#enemyShip" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.06;0.12;0.84;1" dur="6.1s" begin="3.2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="1044 -92;1012 50;1074 164;1028 286" dur="6.1s" begin="3.2s" repeatCount="indefinite" />
      <use href="#enemyShip" />
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.06;0.12;0.84;1" dur="7.2s" begin="4.3s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="246 -90;274 66;236 196;286 320" dur="7.2s" begin="4.3s" repeatCount="indefinite" />
      <use href="#enemyShip" />
    </g>
